<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7">
<title>王剑每日观察｜自动更新下载页</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5f5f7;color:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}
main{width:min(720px,100%);margin:auto;padding:16px 14px 48px}
h1{font-size:25px;margin:8px 0}
.sub{font-size:14px;line-height:1.55;color:#666;margin:0 0 10px}
.toolbar{position:sticky;top:0;z-index:10;background:rgba(245,245,247,.94);backdrop-filter:blur(15px);padding:10px 0 12px}
.state{font-size:13px;color:#555;margin-bottom:8px;line-height:1.45}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,a.btn{border:0;border-radius:13px;padding:13px 10px;font-size:15px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer}
.primary{background:#111;color:#fff}
.secondary{background:#e2e2e7;color:#111}
.refresh{background:#dcecff;color:#0757a8}
.list{display:grid;gap:10px}
.card{background:#fff;border-radius:17px;padding:14px;box-shadow:0 4px 18px rgba(0,0,0,.06)}
.choice{display:flex;gap:11px;align-items:flex-start;cursor:pointer}
.choice input{position:absolute;opacity:0}
.dot{width:22px;height:22px;border:2px solid #b5b5b8;border-radius:50%;margin-top:2px;flex:none;display:grid;place-items:center}
.choice input:checked + .dot{border-color:#111}
.choice input:checked + .dot:after{content:"";width:12px;height:12px;background:#111;border-radius:50%}
.content time{display:block;font-size:13px;color:#777;margin-bottom:5px}
.content strong{display:block;font-size:16px;line-height:1.45}
.watch{display:inline-block;margin:10px 0 0 33px;font-size:13px;color:#1769aa;text-decoration:none}
.note{margin-top:14px;background:#fff4cf;border-radius:14px;padding:13px;font-size:13px;line-height:1.55;color:#5e4a00}
.error{color:#a23720}
.ok{color:#237b35}
@media(max-width:440px){.actions{grid-template-columns:1fr}}
@media(prefers-color-scheme:dark){
 body{background:#111;color:#fff} .toolbar{background:rgba(17,17,17,.94)} .sub,.state{color:#aaa}
 .card{background:#1c1c1e} .secondary{background:#333;color:#fff}
 .choice input:checked + .dot{border-color:#fff} .choice input:checked + .dot:after{background:#fff}
 .note{background:#352d16;color:#f0d989}
}
</style>
</head>
<body>
<main>
<h1>王剑每日观察｜自动更新下载页</h1>
<p class="sub">页面打开后会自动读取频道最新视频，并列出最近 10 期。选择节目后复制链接，再打开下载站。</p>

<section class="toolbar">
  <div class="state" id="state">正在获取最新节目……</div>
  <div class="actions">
    <button class="primary" id="copyBtn">① 复制所选链接</button>
    <a class="btn secondary" href="https://y2mate.gs/" target="_blank" rel="noopener">② 打开 y2mate</a>
    <button class="refresh" id="refreshBtn">重新获取最新节目</button>
    <button class="secondary" id="shareBtn">iPhone 分享</button>
  </div>
</section>

<section class="list" id="list"></section>

<div class="note">
  动态列表依赖 YouTube RSS 和公开 RSS 转换接口。若接口临时不可用，页面会显示内置备用列表。
  y2mate 的广告或跳转不受本页面控制；不要安装配置描述文件、未知 App，也不要允许通知。
</div>
</main>

<script>
const CHANNEL_ID = "UC8UCbiPrm2zN9nZHKdTevZA";
const RSS = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS)}`;
const fallback = [{"date": "2026-07-14", "title": "中共官宣马兴瑞双开习近平权力体系不稳／张展获得刘晓波人权奖／中国出口再创历史新高", "url": "https://www.youtube.com/watch?v=oPxlFN_CfJU"}, {"date": "2026-07-13", "title": "总理李强对中国经济有些紧张／川普宣布对霍尔木兹海峡征费20%／蒋方舟终翻车人民大学褫夺硕士学位", "url": "https://www.youtube.com/watch?v=lnjlULQPDH0"}, {"date": "2026-07-13", "title": "没有中国不行吗？台湾与德国给出相反答案／美菲十四国联合声明纪念南海仲裁十周年／联邦参议员格雷厄姆突然病逝", "url": "https://www.youtube.com/watch?v=j-S97XR02FQ"}, {"date": "2026-07-10", "title": "新闻茶座：洪灾与摆拍，中共政权密码", "url": "https://www.youtube.com/watch?v=XHF_z2pnvTQ"}, {"date": "2026-07-10", "title": "中国人口危机，教育是第一块倒下的多米诺骨牌／川普清空美国选举委员会／强台风巴威已经到台湾", "url": "https://www.youtube.com/watch?v=wicd5ZeQMBA"}];

const listEl = document.getElementById("list");
const stateEl = document.getElementById("state");

function fmtDate(value) {
  const d = new Date(value);
  if (isNaN(d)) return "";
  return d.toLocaleDateString("zh-CN", {year:"numeric",month:"2-digit",day:"2-digit"});
}

function render(items, source) {
  listEl.innerHTML = "";
  items.slice(0,10).forEach((v,i) => {
    const card = document.createElement("article");
    card.className = "card";
    const title = (v.title || "未命名节目").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const url = v.url || v.link;
    const date = v.date || fmtDate(v.pubDate);
    card.innerHTML = `
      <label class="choice">
        <input type="radio" name="video" value="${url}" data-title="${title}" ${i===0?"checked":""}>
        <span class="dot"></span>
        <span class="content"><time>${date}</time><strong>${title}</strong></span>
      </label>
      <a class="watch" href="${url}" target="_blank" rel="noopener">在 YouTube 查看</a>`;
    listEl.appendChild(card);
  });
  stateEl.className = "state ok";
  stateEl.textContent = source === "live"
    ? `已自动更新：显示最新 ${Math.min(items.length,10)} 期`
    : "实时接口暂不可用，当前显示备用列表";
}

async function loadLatest() {
  stateEl.className = "state";
  stateEl.textContent = "正在获取最新节目……";
  try {
    const r = await fetch(API, {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data.status !== "ok" || !Array.isArray(data.items) || !data.items.length) throw new Error("无节目数据");
    const items = data.items
      .filter(x => x.link && x.link.includes("youtube.com/watch"))
      .map(x => ({title:x.title, url:x.link, pubDate:x.pubDate}));
    if (!items.length) throw new Error("没有可用视频");
    render(items, "live");
  } catch(e) {
    render(fallback, "fallback");
    stateEl.className = "state error";
  }
}

function selected() {
  return document.querySelector('input[name="video"]:checked');
}

async function copySelected() {
  const el = selected();
  if (!el) return;
  try {
    await navigator.clipboard.writeText(el.value);
    stateEl.className = "state ok";
    stateEl.textContent = "复制成功。现在点“② 打开 y2mate”。";
  } catch(e) {
    const ta=document.createElement("textarea");
    ta.value=el.value; ta.style.position="fixed"; ta.style.bottom="15px"; ta.style.left="12px";
    ta.style.width="calc(100% - 24px)"; ta.style.height="70px"; ta.style.fontSize="16px"; ta.style.zIndex="9999";
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,ta.value.length);
    stateEl.className = "state";
    stateEl.textContent = "链接已选中，请长按文字框并选择“复制”。";
  }
}

document.getElementById("copyBtn").addEventListener("click", copySelected);
document.getElementById("refreshBtn").addEventListener("click", loadLatest);
document.getElementById("shareBtn").addEventListener("click", async () => {
  const el=selected(); if(!el) return;
  if(navigator.share) {
    try { await navigator.share({title:el.dataset.title,url:el.value}); } catch(e) {}
  } else copySelected();
});

loadLatest();
</script>
</body>
</html>
