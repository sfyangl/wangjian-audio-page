name: Update latest news-live playlist

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-videos.yml'
  schedule:
    - cron: '15 */3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Find the 最新：新闻直播 playlist
        shell: bash
        run: |
          set -euo pipefail

          yt-dlp --flat-playlist --dump-json \
            'https://www.youtube.com/@wongkim728/playlists' > playlists.jsonl

          python - <<'PY'
          import json

          matches = []
          with open('playlists.jsonl', encoding='utf-8') as f:
              for line in f:
                  try:
                      item = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  title = (item.get('title') or '').strip()
                  playlist_id = item.get('id')
                  if playlist_id and title == '最新：新闻直播':
                      matches.append((title, playlist_id))

          if len(matches) != 1:
              raise SystemExit(
                  f'Expected exactly one playlist named 最新：新闻直播, found {len(matches)}: {matches}'
              )

          playlist_id = matches[0][1]
          with open('playlist_url.txt', 'w', encoding='utf-8') as f:
              f.write(f'https://www.youtube.com/playlist?list={playlist_id}')
          print(f'Playlist ID: {playlist_id}')
          PY

      - name: Fetch latest 10 episodes from that playlist only
        shell: bash
        run: |
          set -euo pipefail
          PLAYLIST_URL="$(cat playlist_url.txt)"

          yt-dlp --flat-playlist --playlist-end 10 --dump-json \
            "$PLAYLIST_URL" > videos.jsonl

          python - <<'PY'
          import json, re
          from datetime import datetime, timezone

          items = []
          seen = set()

          with open('videos.jsonl', encoding='utf-8') as f:
              for line in f:
                  try:
                      v = json.loads(line)
                  except json.JSONDecodeError:
                      continue

                  title = (v.get('title') or '').strip()
                  video_id = v.get('id')
                  if not title or not video_id or video_id in seen:
                      continue

                  seen.add(video_id)
                  m = re.search(r'(20\d{6})(?:\D*)$', title)
                  date = ''
                  if m:
                      raw = m.group(1)
                      date = f'{raw[:4]}-{raw[4:6]}-{raw[6:8]}'

                  items.append({
                      'date': date,
                      'title': title,
                      'url': f'https://www.youtube.com/watch?v={video_id}'
                  })

          if len(items) != 10:
              raise SystemExit(
                  f'Playlist returned {len(items)} valid episodes instead of 10; refusing to replace videos.json'
              )

          output = {
              'updated_at': datetime.now(timezone.utc).isoformat(),
              'source_playlist': '最新：新闻直播',
              'items': items
          }

          with open('videos.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print('Wrote exactly 10 episodes from 最新：新闻直播')
          PY

      - name: Commit updated list
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add videos.json
          if git diff --cached --quiet; then
            echo 'No changes.'
          else
            git commit -m 'Update latest 10 news-live episodes'
            git push
          fi
