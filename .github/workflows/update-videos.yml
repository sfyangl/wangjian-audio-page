name: Update latest news videos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-videos.yml'
  schedule:
    - cron: '15 */3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Fetch latest 10 news-live episodes
        shell: bash
        run: |
          set -euo pipefail
          yt-dlp --flat-playlist --playlist-end 60 --dump-json \
            'https://www.youtube.com/@wongkim728/videos' > channel.jsonl

          python - <<'PY'
          import json, re
          from datetime import datetime, timezone

          items = []
          seen = set()
          with open('channel.jsonl', encoding='utf-8') as f:
              for line in f:
                  try:
                      v = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  title = (v.get('title') or '').strip()
                  video_id = v.get('id')
                  if not video_id or video_id in seen:
                      continue
                  # “新闻直播”日常节目标题均带“王剑每日观察”；排除其他栏目。
                  if '王剑每日观察' not in title:
                      continue
                  if any(word in title for word in ('新闻茶座', '每周新闻评论', '会员节目', '直播预告')):
                      continue
                  seen.add(video_id)
                  m = re.search(r'(20\d{6})(?:\D*)$', title)
                  date = ''
                  if m:
                      raw = m.group(1)
                      date = f'{raw[:4]}-{raw[4:6]}-{raw[6:8]}'
                  items.append({
                      'date': date,
                      'title': title,
                      'url': f'https://www.youtube.com/watch?v={video_id}'
                  })
                  if len(items) >= 10:
                      break

          if len(items) < 10:
              raise SystemExit(f'Only found {len(items)} matching episodes; refusing to replace videos.json')

          output = {
              'updated_at': datetime.now(timezone.utc).isoformat(),
              'items': items
          }
          with open('videos.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
              f.write('\n')
          print(f'Wrote {len(items)} episodes')
          PY

      - name: Commit updated list
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add videos.json
          if git diff --cached --quiet; then
            echo 'No changes.'
          else
            git commit -m 'Update latest 10 news videos'
            git push
          fi
